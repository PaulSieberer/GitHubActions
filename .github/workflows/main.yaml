name: CI - Python Quality & Security
 
on:

  push:

    branches:

      - main

      - master

  schedule:

    - cron: '0 0 * * *'

  workflow_dispatch:
 
jobs:

  analyze-code:

    name: Code Analysis & Security

    runs-on: ubuntu-latest
 
    steps:

    - name: Fetch Repository

      uses: actions/checkout@v4
 
    - name: Initialize Python Environment

      uses: actions/setup-python@v5

      with:

        python-version: '3.10'
 
    - name: Core Tools Installation

      run: |

        python -m pip install --upgrade pip

        pip install bandit pip-audit ruff
 
    - name: Project Dependencies Installation

      run: |

        if [ -f requirements.txt ]; then 

          pip install -r requirements.txt

        fi
 
    - name: Code Compilation (Syntax Check)

      run: python -m compileall .
 
    - name: Code Linting (Ruff)

      run: ruff check .
 
    - name: Security Vulnerability Scan (Bandit)

      run: bandit -r app/
 
    - name: Dependency Vulnerability Audit (pip-audit)

      run: pip-audit -r requirements.txt --format json --output audit.json
 
    - name: Archive Audit Report

      uses: actions/upload-artifact@v4

      if: always()

      with:

        name: audit-report

        path: audit.json
 
